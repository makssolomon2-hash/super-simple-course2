        const product2 ={
            name: 'shirt',
            ['delivery-time']: '1 day',
            'delivery-date': 'Monday',
            rating: {
                stars: 4.5,
                count: 87,
                likes: 5345
            },
            fun: function function1(){
                console.log('function inside object');
            },
        };

        console.log(product2);
        console.log(product2.name);
        console.log(product2['name']);
        console.log(product2['delivery-time'])
        console.log(product2['delivery-date'])

        console.log(product2.rating);
        console.log(product2.rating.likes);
        console.log(product2.rating.stars);

        product2.fun();

        console.log(typeof console) //object
        console.log(typeof console.log) //function

        const konsole2 = {
            fun: function log2() {
                console.log('console clone')
            }
        } //console.log

        konsole2.fun();

        console.log(typeof Math)
        console.log(Math)

        //JSON - Java Script Object Notation
        
        JSON.stringify() //sringify functiom inside JSON method.
        console.log(JSON.stringify(product2));
        console.log(typeof JSON.stringify(product2));

        const jsonString = JSON.stringify(product2);
        console.log(JSON.parse(jsonString));

        //local storage
