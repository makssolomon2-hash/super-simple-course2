<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <style src="style.css">
        body {
            margin: 0;
            min-height: 100vh;          
            display: flex;              
            justify-content: center;    
            align-items: center;        
            background: #c1c2c2;
            font-family: Arial, sans-serif;
        }
        .game {
            background: white;
            padding: 40px 60px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            width: 90%;
            max-width: 420px;
        }
        h1 {
            margin: 0 0 20px 0;
            color: #2c3e50;
        }
        p {
            margin: 0 0 30px 0;
            font-size: 1.2rem;
            color: #555;
        }
        button {
            padding: 14px 32px;
            margin: 10px;
            width: 150px;
            
            font-size: 1.1rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            min-width: 110px;
        }
        button:hover {
            background: #2980b9;               
        }
        .buttons {
            display: flex;
            justify-content: center;   
            gap: 16px;               
            flex-wrap: wrap;            
            margin-top: 24px;
        }
    </style>
</head>
    <body>
        <div class="game">
            <h1>Rock Paper Scissors</h1>
            <p>Welcome to the Rock Paper Scissors game! Click the button below to start playing.</p>
            <div class="buttons">
                

                <button onclick="                 
                    playGame('rock');
                ">Play Rock</button>

                <button onclick="
                    playGame('paper');
                ">Play Paper</button>

                <button onclick="
                    playGame('scissors');
                "    
                >Play Scissors</button>
            </div>        
        </div>        
        <script>
            //score , objects
            const score = {
                wins: 0,
                loses: 0,
                ties: 0
            };

            //functions                      
            function playGame(playerMove) {                   
                const computerMove = pickComputerMove();
                let result = '';

                    if (playerMove === 'rock'){
                        if (computerMove === 'rock'){
                            result =('Tie.');
                        }else if(computerMove === 'paper' ){
                            result =('You lose!');
                        }else if(computerMove === 'scissors'){
                            result =('You win!!!');
                    };                    
                    } else if(playerMove === 'paper'){
                        if(computerMove === 'rock'){
                            result =('You win!!!');
                        }else if(computerMove === 'paper' ){
                            result =('Tie.');
                        }else if(computerMove === 'scissors'){
                            result =('You lose!');
                        };                
                    } else if(playerMove === 'scissors'){
                        if(computerMove === 'rock'){
                            result =('You lose');
                        }else if(computerMove === 'paper' ){
                            result =('You win!!!');
                        }else if(computerMove === 'scissors'){
                            result =('Tie.');
                        };
                    };
                console.log(`You picked ${playerMove}. Computer picked ${computerMove}.${result}`);
                alert(`You picked ${playerMove}. Computer picked ${computerMove}.${result}`);
               
            };
                
            function pickComputerMove(){
                const randomNumber = Math.random();
                let computerMove = '';

                    if(randomNumber >= 0 && randomNumber < 1/3 ){
                    computerMove='rock';
                    }else if(randomNumber >= 1/3 && randomNumber <2/3){
                    computerMove='paper';
                    }else if (randomNumber >= 2/3 && randomNumber < 1){
                    computerMove='scissors';
                }
                return computerMove;                                   
            };       
        </script>   
    </body>
</html>
