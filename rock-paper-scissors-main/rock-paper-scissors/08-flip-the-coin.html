<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip The Coin!</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: bisque;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        button{
            background-color: coral;
            height: 200px;
            width: 300px;
            margin: 10px;
            font-weight: 800;
            font-size: x-large;
            border-radius: 10px;
        }
        .container{
            display: flex;
            align-items: center;
            flex-direction: column;
        }

        h2{
            box-sizing: border-box;
            display: flex;
            align-items: center;
            
            width: 200px;
            padding: 20px;
            border-radius: 10px;
            background-color: rgb(223, 223, 223);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Flip the coin game!</h1>
        <p>chosse your guess </p>
        <button onclick="playGame('heads')">HEADS</button>
        <h2 id="ressult"></h2>
        <button onclick="playGame('tails');">TAILS</button>
    </div>
    
    <script>
        let score = (JSON.parse(localStorage.getItem('score2'))) || {
                wins: 0,
                losses: 0,
        };

        function playGame(guess){
            const randomNumber = Math.floor(Math.random()* 2 )+ 1;
            const result = randomNumber <= 1 ? 'heads' : 'tails';

            console.log(randomNumber);
            console.log(result);
            console.log(guess === result ? ' you win' : ' you lose!');

            if(guess === result){
                score.wins++;
            } else{
                score.losses++;
            }console.log(score);
            document.querySelector('h2').innerHTML = `${result}`;
            document.querySelector('h2').innerHTML = `${result + (guess === result ? ', you win' : ', you lose!')}`;
            
            localStorage.setItem('score2', JSON.stringify(score));
        }   

        
    </script>
</body>
</html>
