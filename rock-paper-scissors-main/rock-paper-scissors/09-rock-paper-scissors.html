<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <style src="style.css">
        body {
            margin: 0;
            min-height: 100vh;          
            display: flex;              
            justify-content: center;    
            align-items: center;        
            background: #c1c2c2;
            font-family: Arial, sans-serif;
        }
        .game {
            background: white;
            padding: 40px 60px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            width: 90%;
            max-width: 420px;
        }
        h1 {
            margin: 0 0 20px 0;
            color: #2c3e50;
        }
        p {
            margin: 0 0 30px 0;
            font-size: 1.2rem;
            color: #555;
        }
        button {
            padding: 14px 32px;
            margin: 10px;
            width: 150px;
            
            font-size: 1.1rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            min-width: 110px;
        }
        button:hover {
            background: #2980b9;               
        }
        .buttons {
            display: flex;
            justify-content: center;   
            gap: 16px;               
            flex-wrap: wrap;            
            margin-top: 24px;
        }

        #reset{
             background: #474747;
             width: 300px;
        }

        .js-result{
            font-size: x-large;
            font-weight: 800;
        }
    </style>
</head>
    <body>
        <div class="game">
            <h1>Rock Paper Scissors</h1>
            <p>Welcome to the Rock Paper Scissors game! Click the button below to start playing.</p>
            <div class="buttons">
                

                <button onclick="                 
                    playGame('rock');
                    score['games-played'] +=1;
                ">Play Rock</button>

                <button onclick="
                    playGame('paper');
                    score['games-played'] +=1;
                ">Play Paper</button>

                <button onclick="
                    playGame('scissors');
                    score['games-played'] +=1;
                "    
                >Play Scissors</button>
                
                <div> 
                    <p class="js-moves"></p>
                    <p class="js-result"> </p>
                    <p class="js-score"></p>
                </div>
                

                <button id="reset" onClick="
                    score.wins = 0;
                    score.loses = 0;
                    score.ties = 0;
                    console.log('score has been reseted');
                    console.log(score);
                    updateScoreElement();
                ">Reset score</button>

                
            </div>        
        </div>        
        <script>
            //score , objects
            let score = (JSON.parse(localStorage.getItem('score'))) || {
                wins: 0,
                losses: 0,
                ties: 0
            };
            
            /*
            if (!score){ //(score === null)
                score ={
                    wins: 0,
                    losses: 0,
                    ties: 0
                };
            }
            */
            console.log(score);
            //functions                      
            function playGame(playerMove) {                   
                const computerMove = pickComputerMove();
                let result = '';

                    if (playerMove === 'rock'){
                        if (computerMove === 'rock'){
                            result =('Tie.');
                        }else if(computerMove === 'paper' ){
                            result =('You lose!');
                        }else if(computerMove === 'scissors'){
                            result =('You win!!!');
                    };                    
                    } else if(playerMove === 'paper'){
                        if(computerMove === 'rock'){
                            result =('You win!!!');
                        }else if(computerMove === 'paper' ){
                            result =('Tie.');
                        }else if(computerMove === 'scissors'){
                            result =('You lose!');
                        };                
                    } else if(playerMove === 'scissors'){
                        if(computerMove === 'rock'){
                            result =('You lose!');
                        }else if(computerMove === 'paper' ){
                            result =('You win!!!');
                        }else if(computerMove === 'scissors'){
                            result =('Tie.');
                        };
                    };

                    if (result === 'You win!!!'){
                        score.wins +=1;
                    } else if (result === 'You lose!'){
                        score.loses +=1;
                    } else if (result === 'Tie.'){
                        score.ties +=1;
                    }             
                localStorage.setItem('score', JSON.stringify(score));
                             
                updateScoreElement();

                
                document.querySelector('.js-moves').innerHTML =`Computer picked ${computerMove}` ;
                document.querySelector('.js-result').innerHTML = result;
                //console.log(`You picked ${playerMove}. Computer picked ${computerMove}.${result}`);
                
                /*alert(`You picked ${playerMove}. Computer picked ${computerMove}.${result}
Wins: ${score.wins}, Losses; ${score.loses},Ties: ${score.ties},Games played: ${score['games-played']}` );*/

                
               
            };

            function updateScoreElement(){
                        document.querySelector('.js-score')
                            .innerHTML = `Wins: ${score.wins}, Losses; ${score.loses},Ties: ${score.ties},Games played: ${score['games-played']} ;`
                    }

                    updateScoreElement();
                
            function pickComputerMove(){
                const randomNumber = Math.random();
                let computerMove = '';

                    if(randomNumber >= 0 && randomNumber < 1/3 ){
                    computerMove='rock';
                    }else if(randomNumber >= 1/3 && randomNumber <2/3){
                    computerMove='paper';
                    }else if (randomNumber >= 2/3 && randomNumber < 1){
                    computerMove='scissors';
                }
                return computerMove;                                   
            };       
        </script>   
    </body>
</html>
