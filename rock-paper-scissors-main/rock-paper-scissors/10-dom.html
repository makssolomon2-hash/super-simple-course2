<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Proejcts</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: rgb(52, 52, 52);
            color: aliceblue;
            font-family:Arial, Helvetica, sans-serif ;
        }
        
        .container{
            margin-top: 100px;
            padding: 10px;
            display: flex;
            align-items: center;
            
            flex-direction: column;
        }

        .subscribe-button{
            border: none;
            background-color: black;
            color:white;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 15px;
            padding-right: 15px;
            border-radius: 100px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .is-subscribed{
            background-color: rgb(233, 233, 233);
            color: black;
            
        }

        .like-btn{
          background-color: rgb(153, 153, 153);
          color: white;
          align-items: center;
          text-align: center;
          height: 45px;
          width: 45px;
          border-radius: 100px;
          border: 0px;
          cursor: pointer;
        }

        .like-btn:hover{
          background-color: rgb(196, 196, 196);
          height: 47x;
          width: 47px;
        }

        .is-liked{
          background-color: red;
        }

        .is-liked:hover{
          background-color: rgb(255, 158, 158);
        }
       
      .message-container{

        text-align: center;
        padding: 40px;
        padding-top: 20px;
        background-color:rgb(57, 57, 57) ;
        border-radius: 20px;
        font-weight: 700;

      }
    </style>
</head>
<body>
    <div class="container">
        <p>YouTube Subscribe Button</p>
        <button onclick="
            subscribe();
        " class="js-subscribe-button subscribe-button">Subscribe</button>
        <button class="like-btn" onclick="likeButton();">Like</button>

        <p>Amazon Shipping Calculator</p>
        <input placeholder="Cost of order" class="js-cost-input" onkeydown="
            handleCostKeydown(event)
        ">
        <button onclick="calculateTotal()" >Calculate</button>
        <p class="js-total-cost"></p>


        
        <div class="message-container"> 
          <p>Send a message!</p>
          <input class="message-input" placeholder="Send a message" onkeydown="handleSendKeydown(event)">
          <button class="send-btn">send</button>
          <p class="message-text"></p>
        </div>
        
    </div>
    


    <script>
        String(25)
        console.log('25' - 5);
        console.log('25' + 5);

        window.document
        window.console
        window.alert
         

        function handleCostKeydown(event){
            if(event.key === 'Enter'){
            calculateTotal();
            }; 
        }

        function calculateTotal() {
            const inputElement = document.querySelector('.js-cost-input');
            let cost = Number(inputElement.value);
            //console.log(typeof cost);

            if(cost < 40){
                cost = cost + 10;
            }
            console.log(cost);
            inputElement.value = "";

           document.querySelector('.js-total-cost')
            .innerHTML = `$${cost}`;
        }


        function subscribe(){
            const buttonElement = document.querySelector('.js-subscribe-button ');

            if(buttonElement.innerText === 'Subscribe'){
                buttonElement.innerHTML = 'Subscribed';
                buttonElement.classList.add('is-subscribed');
            } else {
                buttonElement.innerHTML = 'Subscribe';
                buttonElement.classList.remove('is-subscribed');
            }
        }

        function likeButton(){
          const likeElement = document.querySelector('.like-btn');

          if(likeElement.innerText === 'Like'){
            likeElement.innerHTML = 'Liked';
            likeElement.classList.add('is-liked');
          }else{
            likeElement.innerHTML = 'Like';
            likeElement.classList.remove('is-liked');
          }
        }

        function sendMessage(){
          const messageInput = document.querySelector('.message-input');
          let message = (messageInput.value);

          messageInput.value = "";
          
          document.querySelector('.message-text')
          .innerHTML = `${ message }`;     
        }

         function handleSendKeydown(event){
            if(event.key === 'Enter'){
            sendMessage();
            }; 
        }
    </script>
</body>
</html>
