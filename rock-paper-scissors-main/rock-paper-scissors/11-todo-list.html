<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARRAYS | To Do list</title>
    <link rel="stylesheet" href="styles/11-todo.css">
</head>
<body>
  <div class="main-container">
    <h2>To Do List</h2>
    <div class="todo-grid">
      <input placeholder="Todo name" class="js-name-input name-input" onkeydown="
        handleCostKeydown(event)"
      >
      <input 
        type="date"
        class="js-due-date-input date-input"
        onkeydown="handleCostKeydown(event)"
      >
      <button onclick="addToDo()" class="add-button">Add</button>
    </div>
    <div class="container todo-grid"></div>
  </div>

  <script src="scripts/todo-list.js"></script> 
</body>
</html>
